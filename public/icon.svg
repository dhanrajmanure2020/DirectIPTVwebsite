<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="tvGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0055ff"/>
      <stop offset="100%" stop-color="#0011aa"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6a00ff"/>
      <stop offset="50%" stop-color="#ff007f"/>
      <stop offset="100%" stop-color="#ff8800"/>
    </linearGradient>
    <linearGradient id="swooshGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#ff00cc"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Antennas -->
  <path d="M 210 110 L 256 140 L 302 110" stroke="#0055ff" stroke-width="16" stroke-linecap="round" fill="none" />
  <circle cx="210" cy="110" r="16" fill="#0055ff" />
  <circle cx="302" cy="110" r="16" fill="#0055ff" />

  <!-- TV Body -->
  <rect x="90" y="140" width="332" height="232" rx="60" fill="url(#tvGrad)" filter="url(#glow)" />
  
  <!-- Screen -->
  <rect x="120" y="170" width="272" height="172" rx="30" fill="url(#screenGrad)" />
  
  <!-- Play Button -->
  <path d="M 226 216 L 306 256 L 226 296 Z" fill="#ffffff" filter="url(#glow)"/>

  <!-- Swoosh -->
  <path d="M 70 380 Q 256 460 460 220 Q 380 380 200 400 Q 100 400 70 380 Z" fill="url(#swooshGrad)" />
</svg>
